spring.application.name=petbuddies-ai
server.port=8080
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# ── Spring AI — Gemini via endpoint OpenAI-compatible
spring.ai.openai.base-url=https://generativelanguage.googleapis.com/v1beta/openai
spring.ai.openai.api-key=${GEMINI_API_KEY}
spring.ai.openai.chat.options.model=gemini-2.5-flash

# ── Spring AI Retry (429 / erros transientes)
spring.ai.retry.max-attempts=3
spring.ai.retry.backoff.initial-interval=2000
spring.ai.retry.backoff.multiplier=2
spring.ai.retry.backoff.max-interval=10000
spring.ai.retry.on-client-errors=false

# ── Oracle FIAP
spring.datasource.url=${ORACLE_URL:jdbc:oracle:thin:@oracle.fiap.com.br:1521/ORCL}
spring.datasource.username=${ORACLE_USER}
spring.datasource.password=${ORACLE_PASSWORD}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.default_schema=${ORACLE_USER}
spring.jpa.open-in-view=false

# ── Spring AI JDBC Memory
spring.ai.chat.memory.repository.jdbc.initialize-schema=always

# ── Evolution API
evolution.api.url=${EVOLUTION_API_URL:http://localhost:8081}
evolution.api.key=${EVOLUTION_API_KEY:sem-chave}
evolution.api.instance=${EVOLUTION_API_INSTANCE:petbuddies}

# ── VetAPI .NET (sobrescrito por profile)
petnetapi.url=${VET_API_URL:http://localhost:5297}

# ── Swagger
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.tags-sorter=none
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.default-produces-media-type=application/json

# ── Logging — console only
logging.level.br.com.fiap.petbuddies=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.tool.schema=WARN

spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
